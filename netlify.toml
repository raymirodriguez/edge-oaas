[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[functions.oaas-query]
  timeout = 26  # Pro-plan hard ceiling for sync functions; beyond this requires a background/edge approach

[[redirects]]
  from = "/api/oaas-query"
  to = "/.netlify/functions/oaas-query"
  status = 200
  force = true

[[redirects]]
  from = "/api/log-execution"
  to = "/.netlify/functions/log-execution"
  status = 200
  force = true
