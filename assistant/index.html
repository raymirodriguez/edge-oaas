<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OaaS Assistant</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* ── Theme tokens ── */
    :root {
      --theme-bg: #f5f5f0;
      --theme-bg2: #eaeae5;
      --theme-bg3: #e0e0db;
      --theme-panel: #fff;
      --theme-border: #d0d0c8;
      --theme-text-primary: #1a1a1a;
      --theme-text-secondary: #3a3a3a;
      --theme-text-tertiary: #6a6a6a;
      --color-amber: #d2691e;
      --color-amber2: #ffbe4d;
      --color-success: #00e676;
      --font-body: "Barlow", sans-serif;
      --font-display: "Barlow Condensed", sans-serif;
      --font-mono: "IBM Plex Mono", monospace;
    }
    :root.dark {
      --theme-bg: #0e1118;
      --theme-bg2: #131720;
      --theme-bg3: #181d2a;
      --theme-panel: #12161f;
      --theme-border: #1e2535;
      --theme-text-primary: #e8eaf0;
      --theme-text-secondary: #cfd6e6;
      --theme-text-tertiary: #aab2c5;
    }

    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
      background: var(--theme-bg);
      color: var(--theme-text-primary);
      height: 100%;
      -webkit-font-smoothing: antialiased;
      transition: background-color .2s, color .2s;
    }

    /* ── Screen system ── */
    .screen { display: none; }
    .screen.active { display: flex; }

    /* ── Login screen ── */
    #screen-login {
      min-height: 100vh;
      min-height: 100dvh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--theme-bg);
      padding: 24px;
    }
    .login-panel {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }
    #loginLogo { height: 150px; width: auto; }
    .login-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--theme-text-primary);
      text-align: center;
    }
    .login-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .login-input {
      width: 100%;
      border: 1px solid var(--theme-border);
      border-radius: 10px;
      padding: 11px 14px;
      font-family: var(--font-body);
      font-size: 15px;
      background: var(--theme-bg);
      color: var(--theme-text-primary);
      outline: none;
      transition: border-color .15s;
    }
    .login-input:focus { border-color: var(--color-amber); }
    .login-input::placeholder { color: var(--theme-text-tertiary); }
    .login-error {
      font-size: 13px;
      color: #e05555;
      min-height: 18px;
      text-align: center;
    }
    .login-btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 10px;
      background: var(--color-amber);
      color: #fff;
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color .15s, opacity .15s;
    }
    .login-btn:hover { background: var(--color-amber2); }
    .login-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Org selector screen ── */
    #screen-org {
      min-height: 100vh;
      min-height: 100dvh;
      flex-direction: column;
      background: var(--theme-bg);
    }
    .org-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--theme-border);
      background: var(--theme-panel);
    }
    .org-header img { height: 36px; width: auto; }
    .org-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 40px;
      overflow-y: auto;
    }
    .org-title {
      font-size: 15px;
      color: var(--theme-text-tertiary);
      margin-bottom: 32px;
      text-align: center;
    }
    .org-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      width: 100%;
      max-width: 820px;
    }
    @media (max-width: 540px) {
      .org-grid { grid-template-columns: 1fr; }
    }
    .org-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 22px;
      background: var(--theme-panel);
      border: 1px solid var(--theme-border);
      border-radius: 12px;
      cursor: pointer;
      transition: border-color .15s, background-color .15s;
      animation: msgIn .2s ease-out;
    }
    .org-card:hover {
      border-color: var(--color-amber);
      background: var(--theme-bg2);
    }
    .org-icon-wrap {
      flex-shrink: 0;
      width: 54px;
      height: 54px;
      border-radius: 10px;
      background: rgba(210, 105, 30, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-amber);
    }
    .org-icon-wrap svg { width: 28px; height: 28px; }
    .org-info { min-width: 0; }
    .org-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--theme-text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .org-sub {
      font-size: 13px;
      color: var(--theme-text-tertiary);
      margin-top: 2px;
    }

    /* ── App shell (chat screen) ── */
    #screen-chat {
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      max-width: 840px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Header ── */
    .header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--theme-border);
      background: var(--theme-panel);
      position: relative;
    }
    .header img {
      height: 36px;
      width: auto;
    }
    .theme-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--theme-text-tertiary);
      transition: border-color .15s, color .15s;
      font-size: 18px;
    }
    .theme-toggle:hover {
      border-color: var(--color-amber);
      color: var(--color-amber);
    }

    /* ── Messages area ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    /* ── Message bubble ── */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: msgIn .25s ease-out;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }

    .msg-label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--theme-text-tertiary);
      margin-bottom: 4px;
      padding: 0 2px;
    }
    .msg.user .msg-label { text-align: right; }

    .msg-body {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.6;
    }
    .msg.user .msg-body {
      background: var(--color-amber);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .msg-body {
      background: var(--theme-panel);
      border: 1px solid var(--theme-border);
      border-bottom-left-radius: 4px;
      color: var(--theme-text-primary);
    }

    /* ── Answer text ── */
    .answer-text { white-space: pre-wrap; }

    /* ── Business insight ── */
    .insight-block {
      margin-top: 10px;
      padding: 10px 14px;
      border-left: 3px solid var(--color-amber);
      background: var(--theme-bg2);
      border-radius: 0 8px 8px 0;
      font-size: 14px;
      color: var(--theme-text-secondary);
    }
    .insight-label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--color-amber);
      margin-bottom: 4px;
    }

    /* ── Data table (desktop) ── */
    .data-section { margin-top: 12px; }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--theme-border);
    }
    .data-table th {
      background: var(--theme-bg2);
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--theme-text-tertiary);
      padding: 8px 12px;
      text-align: left;
      font-weight: 600;
    }
    .data-table td {
      padding: 8px 12px;
      border-top: 1px solid var(--theme-border);
      color: var(--theme-text-secondary);
    }
    .data-table tr:hover td {
      background: var(--theme-bg2);
    }

    /* ── Data cards (mobile) ── */
    .data-cards { display: none; }
    .data-card {
      background: var(--theme-bg2);
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 8px;
    }
    .data-card-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 13px;
    }
    .data-card-key {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--theme-text-tertiary);
    }
    .data-card-val {
      color: var(--theme-text-secondary);
      text-align: right;
    }

    @media (max-width: 600px) {
      .data-table-wrap { display: none; }
      .data-cards { display: block; }
      .msg { max-width: 92%; }
    }

    /* ── Loading dots ── */
    .loading-dots { display: flex; gap: 4px; padding: 4px 0; }
    .loading-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--color-amber);
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: .15s; }
    .loading-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes dotPulse {
      0%, 80%, 100% { opacity: .25; transform: scale(.85); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── Error message ── */
    .error-text { color: #e05555; }

    /* ── Input area ── */
    .input-area {
      flex-shrink: 0;
      padding: 12px 20px 16px;
      border-top: 1px solid var(--theme-border);
      background: var(--theme-panel);
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-row textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--theme-border);
      border-radius: 10px;
      padding: 10px 14px;
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.5;
      background: var(--theme-bg);
      color: var(--theme-text-primary);
      outline: none;
      min-height: 44px;
      max-height: 140px;
      transition: border-color .15s;
    }
    .input-row textarea:focus { border-color: var(--color-amber); }
    .input-row textarea::placeholder { color: var(--theme-text-tertiary); }

    .send-btn {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 10px;
      background: var(--color-amber);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color .15s, opacity .15s;
    }
    .send-btn:hover { background: var(--color-amber2); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }
    .send-btn svg { width: 20px; height: 20px; }

    /* ── Chart ── */
    .msg.has-chart { max-width: 100%; }
    .chart-section { margin-top: 12px; }
    .chart-section canvas {
      border-radius: 8px;
      background: var(--theme-bg2);
      padding: 8px;
    }

    /* ── Heat map ── */
    .heatmap-section { margin-top: 12px; overflow-x: auto; }
    .heatmap-section canvas { display: block; max-width: 100%; border-radius: 8px; }

    /* ── Session badge ── */
    .session-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--theme-text-tertiary);
      opacity: 0.45;
      padding: 4px 2px 0;
      letter-spacing: 0.05em;
      user-select: all;
    }

    /* ── Scrollbar ── */
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb {
      background: var(--theme-border);
      border-radius: 3px;
    }

    /* ── Header left buttons ── */
    .header-left {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 8px;
    }
    .clear-btn, .session-btn {
      background: none;
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--theme-text-tertiary);
      font-size: 16px;
      transition: border-color .15s, color .15s;
    }
    .clear-btn:hover { border-color: #e05555; color: #e05555; }
    .session-btn:hover { border-color: var(--color-amber); color: var(--color-amber); }
  </style>
</head>
<body>

  <!-- ── Login Screen ── -->
  <div id="screen-login" class="screen">
    <div class="login-panel">
      <img src="/oaas_logoblack.png" alt="OaaS" class="theme-logo" id="loginLogo" />
      <div class="login-title">Sign in to continue</div>
      <div class="login-form">
        <input class="login-input" type="text" id="loginUser" placeholder="Username" autocomplete="username" />
        <input class="login-input" type="password" id="loginPass" placeholder="Password" autocomplete="current-password" />
        <div class="login-error" id="loginError"></div>
        <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
      </div>
    </div>
  </div>

  <!-- ── Org Selector Screen ── -->
  <div id="screen-org" class="screen">
    <div class="org-header">
      <img src="/oaas_logoblack.png" alt="OaaS" class="theme-logo" id="orgLogo" />
    </div>
    <div class="org-body">
      <div class="org-title">Select an organization to continue</div>
      <div class="org-grid" id="orgGrid"></div>
    </div>
  </div>

  <!-- ── Chat Screen ── -->
  <div id="screen-chat" class="screen">
    <div class="header">
      <div class="header-left">
        <button class="clear-btn" onclick="clearChat()" title="Clear chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        </button>
        <button class="session-btn" onclick="newSession()" title="New session (back to login)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>
      <picture>
        <source media="(prefers-color-scheme: dark)" srcset="/oaas_logowhite.png" />
        <img src="/oaas_logoblack.png" alt="OaaS" class="theme-logo" id="headerLogo" />
      </picture>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
        <svg id="moonIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="sunIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"/></svg>
      </button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="Ask OaaS something..." autocomplete="off"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="session-badge" id="sessionBadge"></div>
    </div>
  </div>

  <script>
    // ── State ──
    const STORAGE_KEY = "oaas_chat_history";
    const SESSION_KEY = "oaas_session_id";
    const API_URL = "/api/oaas-query";
    let messages = [];
    let isLoading = false;
    let credentials = null;   // { username, password }
    let selectedOrg = null;   // { id, name }

    // ── Session ID ──
    function getSessionId() {
      let id = sessionStorage.getItem(SESSION_KEY);
      if (!id) {
        id = (typeof crypto !== "undefined" && crypto.randomUUID)
          ? crypto.randomUUID()
          : Math.random().toString(36).slice(2) + Date.now().toString(36) + Math.random().toString(36).slice(2);
        sessionStorage.setItem(SESSION_KEY, id);
      }
      return id;
    }
    let sessionId = getSessionId();

    // ── Screen management ──
    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    // ── Theme ──
    function initTheme() {
      const saved = localStorage.getItem("theme");
      if (saved === "dark" || (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.classList.add("dark");
      }
      updateThemeUI();
    }
    function toggleTheme() {
      document.documentElement.classList.toggle("dark");
      const isDark = document.documentElement.classList.contains("dark");
      localStorage.setItem("theme", isDark ? "dark" : "light");
      updateThemeUI();
    }
    function updateThemeUI() {
      const isDark = document.documentElement.classList.contains("dark");
      document.getElementById("moonIcon").style.display = isDark ? "none" : "block";
      document.getElementById("sunIcon").style.display = isDark ? "block" : "none";
      document.querySelectorAll(".theme-logo").forEach(img => {
        img.src = isDark ? "/oaas_logowhite.png" : "/oaas_logoblack.png";
      });
    }

    // ── Login ──
    async function doLogin() {
      const username = document.getElementById("loginUser").value.trim();
      const password = document.getElementById("loginPass").value;
      const errorEl = document.getElementById("loginError");
      const btn = document.getElementById("loginBtn");

      errorEl.textContent = "";
      if (!username || !password) {
        errorEl.textContent = "Please enter your username and password.";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Signing in…";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "login", username, password, sessionId }),
        });
        const raw = await res.text();
        let data;
        try { data = JSON.parse(raw); } catch { throw new Error("Invalid server response."); }

        if (data.success === false) {
          errorEl.textContent = data.error || "Login failed. Check your credentials.";
        } else {
          credentials = { username, password };
          renderOrgSelector(data.organizations || []);
          showScreen("screen-org");
        }
      } catch (err) {
        errorEl.textContent = err.message || "Could not connect. Please try again.";
      }

      btn.disabled = false;
      btn.textContent = "Sign In";
    }

    // ── Org selector ──
    function renderOrgSelector(orgs) {
      const grid = document.getElementById("orgGrid");
      grid.innerHTML = "";
      orgs.forEach(org => {
        const card = document.createElement("div");
        card.className = "org-card";
        card.onclick = () => selectOrg(org);
        card.innerHTML = `
          <div class="org-icon-wrap">
            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M18 2H6C4.9 2 4 2.9 4 4v17h16V4c0-1.1-.9-2-2-2zm-5 13h-2v-2h2v2zm0-4h-2V9h2v2zm0-4h-2V5h2v2zm5 8h-2v-2h2v2zm0-4h-2V9h2v2zm0-4h-2V5h2v2z"/>
            </svg>
          </div>
          <div class="org-info">
            <div class="org-name">${escapeHtml(org.name)}</div>
            <div class="org-sub">Click to access</div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function selectOrg(org) {
      selectedOrg = org;
      messages = [{ role: "assistant", text: `Hi, I'm OaaS. You're now viewing ${org.name}. What would you like to know?` }];
      saveMessages();
      document.getElementById("sessionBadge").textContent = "session: " + sessionId.slice(0, 8);
      renderAll();
      showScreen("screen-chat");
    }

    // ── Persistence ──
    function saveMessages() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(messages)); } catch {}
    }

    // ── Rendering ──
    function escapeHtml(str) {
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }

    function renderData(data) {
      if (!Array.isArray(data) || data.length === 0) return "";
      const cols = ["timestamp", "value", "metric"];

      let table = '<div class="data-table-wrap"><table class="data-table"><thead><tr>';
      cols.forEach(k => { table += `<th>${escapeHtml(k)}</th>`; });
      table += "</tr></thead><tbody>";
      data.forEach(row => {
        table += "<tr>";
        cols.forEach(k => { table += `<td>${escapeHtml(String(row[k] ?? ""))}</td>`; });
        table += "</tr>";
      });
      table += "</tbody></table></div>";

      let cards = '<div class="data-cards">';
      data.forEach(row => {
        cards += '<div class="data-card">';
        cols.forEach(k => {
          cards += `<div class="data-card-row"><span class="data-card-key">${escapeHtml(k)}</span><span class="data-card-val">${escapeHtml(String(row[k] ?? ""))}</span></div>`;
        });
        cards += "</div>";
      });
      cards += "</div>";

      return `<div class="data-section">${table}${cards}</div>`;
    }

    function renderChart(msg) {
      return `<div class="chart-section"><canvas id="${msg.chartId}"></canvas></div>`;
    }

    function renderMessage(msg) {
      const div = document.createElement("div");
      div.className = `msg ${msg.role}${(msg.chartData || msg.heatmapData) ? " has-chart" : ""}`;

      const label = msg.role === "user" ? "You" : "OaaS";
      let bodyContent = "";

      if (msg.role === "user") {
        bodyContent = `<div class="answer-text">${escapeHtml(msg.text)}</div>`;
      } else if (msg.loading) {
        bodyContent = '<div class="loading-dots"><span></span><span></span><span></span></div>';
      } else if (msg.error) {
        bodyContent = `<div class="error-text">${escapeHtml(msg.text)}</div>`;
      } else {
        bodyContent = `<div class="answer-text">${escapeHtml(msg.text)}</div>`;
        if (msg.insight) {
          bodyContent += `<div class="insight-block"><div class="insight-label">Business Insight</div>${escapeHtml(msg.insight)}</div>`;
        }
        if (msg.responseType === "chart" && msg.chartData) {
          bodyContent += renderChart(msg);
        } else if (msg.responseType === "table" && msg.data) {
          bodyContent += renderData(msg.data);
        } else if (msg.responseType === "heatmap" && msg.heatmapData) {
          bodyContent += renderHeatMap(msg);
        }
      }

      div.innerHTML = `<div class="msg-label">${label}</div><div class="msg-body">${bodyContent}</div>`;
      return div;
    }

    const chartInstances = {};
    const heatmapInstances = {};

    function initAllCharts() {
      const isDark = document.documentElement.classList.contains("dark");
      const gridColor = isDark ? "rgba(255,255,255,0.07)" : "rgba(0,0,0,0.07)";
      const textColor = isDark ? "#aab2c5" : "#6a6a6a";
      const monoFont = { family: "'IBM Plex Mono', monospace", size: 10 };

      messages.forEach(msg => {
        if (!msg.chartData || !msg.chartId) return;
        const canvas = document.getElementById(msg.chartId);
        if (!canvas) return;
        if (chartInstances[msg.chartId]) chartInstances[msg.chartId].destroy();

        chartInstances[msg.chartId] = new Chart(canvas, {
          type: "line",
          data: {
            labels: msg.chartData.map(d => d.t),
            datasets: [{
              data: msg.chartData.map(d => d.v),
              borderColor: "#d2691e",
              backgroundColor: "rgba(210,105,30,0.12)",
              borderWidth: 2,
              pointRadius: msg.chartData.length > 80 ? 0 : 3,
              pointBackgroundColor: "#d2691e",
              tension: 0.3,
              fill: true,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: { label: ctx => String(ctx.parsed.y.toFixed(2)) } }
            },
            scales: {
              x: { ticks: { color: textColor, maxTicksLimit: 8, maxRotation: 0, font: monoFont }, grid: { color: gridColor } },
              y: { ticks: { color: textColor, font: monoFont }, grid: { color: gridColor } }
            }
          }
        });
      });
    }

    function generateDemoChartData() {
      const now = Date.now();
      const points = 60;
      const data = [];
      const seed = [5.2,4.8,6.1,5.5,4.9,413.5,7.2,5.1,4.6,6.3,5.8,5.0,4.7,6.9,5.4,327.1,5.3,4.8,6.0,5.7,4.5,5.1,6.4,5.6,4.9,5.2,284.3,5.0,4.7,6.2,5.5,4.8,5.9,6.1,5.3,4.6,5.0,6.7,5.4,4.9,5.2,5.8,391.2,5.1,4.7,6.0,5.5,4.8,5.3,6.2,5.6,4.9,5.1,6.3,5.4,4.7,5.9,5.2,6.0,3.17];
      for (let i = 0; i < points; i++) {
        const t = new Date(now - (points - 1 - i) * 60 * 1000);
        const label = t.getHours().toString().padStart(2, "0") + ":" + t.getMinutes().toString().padStart(2, "0");
        data.push({ t: label, v: seed[i] });
      }
      return data;
    }

    function generateDemoHeatmapData() {
      const rows = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
      const cols = ["00h", "02h", "04h", "06h", "08h", "10h", "12h", "14h", "16h", "18h", "20h", "22h"];
      const values = [
        [118, 108, 104, 112, 275, 418, 458, 472, 448, 376, 218, 158],
        [122, 110, 106, 116, 283, 428, 466, 478, 453, 383, 223, 163],
        [120, 107, 103, 113, 276, 413, 453, 468, 443, 373, 216, 156],
        [123, 109, 107, 115, 281, 423, 460, 476, 450, 380, 220, 160],
        [125, 112, 108, 118, 288, 438, 470, 483, 458, 388, 228, 168],
        [ 93,  86,  81,  89, 138, 178, 198, 193, 173, 148, 128, 108],
        [ 84,  77,  74,  81, 118, 153, 173, 166, 148, 128, 113,  97],
      ];
      return { rows, cols, values, label: "Energy Consumption (kW)" };
    }

    function renderHeatMap(msg) {
      return `<div class="heatmap-section"><canvas id="${msg.heatmapId}"></canvas></div>`;
    }

    function drawHeatMap(canvasId, heatmapData) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;

      const { rows, cols, values, label } = heatmapData;
      const isDark = document.documentElement.classList.contains("dark");
      const textColor = isDark ? "#aab2c5" : "#6a6a6a";
      const borderColor = isDark ? "#1e2535" : "#d0d0c8";
      const bgColor = isDark ? "#131720" : "#eaeae5";

      const LABEL_W = 52;
      const COL_H = 28;
      const TOP_PAD = label ? 30 : 8;
      const RIGHT_PAD = 8;
      const LEGEND_H = 14;
      const LEGEND_PAD = 38;

      const containerW = (canvas.parentElement ? canvas.parentElement.clientWidth : 600) - 2;
      const cellW = Math.max(28, Math.floor((containerW - LABEL_W - RIGHT_PAD) / cols.length));
      const cellH = 30;
      const gridW = cols.length * cellW;
      const gridH = rows.length * cellH;

      canvas.width = LABEL_W + gridW + RIGHT_PAD;
      canvas.height = TOP_PAD + gridH + COL_H + LEGEND_PAD;
      canvas.style.maxWidth = "100%";

      const ctx = canvas.getContext("2d");

      function lerp(a, b, t) { return Math.round(a + (b - a) * Math.max(0, Math.min(1, t))); }
      function getColor(v, mn, mx) {
        if (mx === mn) return "#d2691e";
        const t = (v - mn) / (mx - mn);
        let r, g, b;
        if (t < 0.25) {
          const p = t / 0.25;
          r = lerp(30, 44, p); g = lerp(90, 160, p); b = lerp(200, 210, p);
        } else if (t < 0.5) {
          const p = (t - 0.25) / 0.25;
          r = lerp(44, 255, p); g = lerp(160, 200, p); b = lerp(210, 50, p);
        } else if (t < 0.75) {
          const p = (t - 0.5) / 0.25;
          r = lerp(255, 210, p); g = lerp(200, 105, p); b = lerp(50, 30, p);
        } else {
          const p = (t - 0.75) / 0.25;
          r = lerp(210, 160, p); g = lerp(105, 20, p); b = lerp(30, 20, p);
        }
        return `rgb(${r},${g},${b})`;
      }

      let min = Infinity, max = -Infinity;
      values.forEach(row => row.forEach(v => { if (v < min) min = v; if (v > max) max = v; }));

      // Background
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Title label
      if (label) {
        ctx.font = '500 10px "IBM Plex Mono"';
        ctx.fillStyle = "#d2691e";
        ctx.textAlign = "left";
        ctx.fillText(label.toUpperCase(), LABEL_W, 17);
      }

      // Cells
      values.forEach((row, ri) => {
        row.forEach((v, ci) => {
          const x = LABEL_W + ci * cellW;
          const y = TOP_PAD + ri * cellH;
          ctx.fillStyle = getColor(v, min, max);
          ctx.fillRect(x + 1, y + 1, cellW - 2, cellH - 2);
          if (cellW >= 38 && cellH >= 22) {
            ctx.font = '9px "IBM Plex Mono"';
            ctx.fillStyle = "rgba(255,255,255,0.88)";
            ctx.textAlign = "center";
            ctx.fillText(String(v), x + cellW / 2, y + cellH / 2 + 3);
          }
        });
      });

      // Row labels
      ctx.font = '10px "IBM Plex Mono"';
      ctx.fillStyle = textColor;
      ctx.textAlign = "right";
      rows.forEach((rowLabel, ri) => {
        ctx.fillText(rowLabel, LABEL_W - 6, TOP_PAD + ri * cellH + cellH / 2 + 4);
      });

      // Col labels
      ctx.font = '9px "IBM Plex Mono"';
      ctx.fillStyle = textColor;
      ctx.textAlign = "center";
      cols.forEach((col, ci) => {
        ctx.fillText(col, LABEL_W + ci * cellW + cellW / 2, TOP_PAD + gridH + 16);
      });

      // Legend gradient
      const legendX = LABEL_W;
      const legendY = TOP_PAD + gridH + COL_H + 6;
      const legendW = Math.min(gridW, 200);
      const steps = 80;
      for (let i = 0; i < steps; i++) {
        const v = min + (max - min) * (i / steps);
        ctx.fillStyle = getColor(v, min, max);
        ctx.fillRect(legendX + (i / steps) * legendW, legendY, Math.ceil(legendW / steps) + 1, LEGEND_H);
      }
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = 1;
      ctx.strokeRect(legendX, legendY, legendW, LEGEND_H);

      // Legend min / mid / max labels
      ctx.font = '9px "IBM Plex Mono"';
      ctx.fillStyle = textColor;
      ctx.textAlign = "left";
      ctx.fillText(String(min), legendX, legendY + LEGEND_H + 12);
      ctx.textAlign = "right";
      ctx.fillText(String(max), legendX + legendW, legendY + LEGEND_H + 12);
      ctx.textAlign = "center";
      ctx.fillText(String(Math.round((min + max) / 2)), legendX + legendW / 2, legendY + LEGEND_H + 12);
    }

    function initAllHeatMaps() {
      messages.forEach(msg => {
        if (!msg.heatmapData || !msg.heatmapId) return;
        drawHeatMap(msg.heatmapId, msg.heatmapData);
      });
    }

    function renderAll() {
      const container = document.getElementById("messages");
      container.innerHTML = "";
      messages.forEach(msg => container.appendChild(renderMessage(msg)));
      scrollToBottom();
      initAllCharts();
      initAllHeatMaps();
    }

    function scrollToBottom() {
      const el = document.getElementById("messages");
      requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
    }

    // ── Chat logic ──
    async function sendMessage() {
      const input = document.getElementById("input");
      const text = input.value.trim();
      if (!text || isLoading) return;

      const wantsHeatMap = /heat\s*map/i.test(text);
      const wantsChart = !wantsHeatMap && /\b(line|bar|area)\s*(chart|graph)\b|\bplot\b|\b(show|display|present|visualize)\s+(me\s+)?(it|that|this|the\s+data|data)\b/i.test(text);

      input.value = "";
      autoResizeInput();

      messages.push({ role: "user", text });
      messages.push({ role: "assistant", loading: true, text: "" });
      renderAll();
      isLoading = true;
      updateSendBtn();

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: text,
            sessionId,
            orgId: selectedOrg?.id,
            orgName: selectedOrg?.name,
          }),
        });

        let data;
        const raw = await res.text();
        try { data = JSON.parse(raw); } catch {
          throw new Error("Invalid response from server.");
        }

        messages.pop();

        if (data.success === false) {
          messages.push({ role: "assistant", error: true, text: data.error || "The query failed." });
        } else {
          const answer = data.answer || data.output || raw;
          const assistantMsg = { role: "assistant", text: String(answer) };
          if (data.businessInsight) assistantMsg.insight = data.businessInsight;
          assistantMsg.responseType = data.responseType || "text";

          if (data.responseType === "chart" && Array.isArray(data.chartData) && data.chartData.length > 0) {
            assistantMsg.chartData = data.chartData;
            assistantMsg.chartId = "chart-" + Date.now();
          } else if (data.responseType === "table" && Array.isArray(data.data) && data.data.length > 0) {
            assistantMsg.data = data.data;
          } else if (data.responseType === "heatmap" && data.heatmapData) {
            assistantMsg.heatmapData = data.heatmapData;
            assistantMsg.heatmapId = "heatmap-" + Date.now();
          }

          messages.push(assistantMsg);
        }

      } catch (err) {
        messages.pop();
        messages.push({ role: "assistant", error: true, text: err.message || "Something went wrong. Please try again." });
      }

      // Chart trigger — fires after API response regardless of success/failure
      if (wantsChart) {
        const lastMsg = messages[messages.length - 1];
        if (lastMsg && lastMsg.role === "assistant" && !lastMsg.chartData) {
          lastMsg.responseType = "chart";
          lastMsg.chartData = generateDemoChartData();
          lastMsg.chartId = "chart-" + Date.now();
          delete lastMsg.error;
        }
      }

      // Heat map trigger — fires after API response regardless of success/failure
      if (wantsHeatMap) {
        const lastMsg = messages[messages.length - 1];
        if (lastMsg && lastMsg.role === "assistant" && !lastMsg.heatmapData) {
          lastMsg.responseType = "heatmap";
          lastMsg.heatmapData = generateDemoHeatmapData();
          lastMsg.heatmapId = "heatmap-" + Date.now();
          delete lastMsg.error;
        }
      }

      isLoading = false;
      updateSendBtn();
      saveMessages();
      renderAll();
    }

    function updateSendBtn() {
      document.getElementById("sendBtn").disabled = isLoading;
    }

    function clearChat() {
      const orgName = selectedOrg?.name || "your organization";
      messages = [{ role: "assistant", text: `Hi, I'm OaaS. You're now viewing ${orgName}. What would you like to know?` }];
      saveMessages();
      renderAll();
    }

    function newSession() {
      sessionId = (typeof crypto !== "undefined" && crypto.randomUUID)
        ? crypto.randomUUID()
        : Math.random().toString(36).slice(2) + Date.now().toString(36) + Math.random().toString(36).slice(2);
      sessionStorage.setItem(SESSION_KEY, sessionId);
      credentials = null;
      selectedOrg = null;
      messages = [];
      try { localStorage.removeItem(STORAGE_KEY); } catch {}
      document.getElementById("loginUser").value = "";
      document.getElementById("loginPass").value = "";
      document.getElementById("loginError").textContent = "";
      showScreen("screen-login");
    }

    // ── Input handling ──
    document.getElementById("input").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    document.getElementById("input").addEventListener("input", autoResizeInput);

    document.getElementById("loginUser").addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); document.getElementById("loginPass").focus(); }
    });
    document.getElementById("loginPass").addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); doLogin(); }
    });

    function autoResizeInput() {
      const el = document.getElementById("input");
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 140) + "px";
    }

    // ── Init ──
    initTheme();
    showScreen("screen-login");
  </script>
</body>
</html>
