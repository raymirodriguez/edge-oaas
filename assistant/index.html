<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OaaS Assistant</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* ── Theme tokens ── */
    :root {
      --theme-bg: #f5f5f0;
      --theme-bg2: #eaeae5;
      --theme-bg3: #e0e0db;
      --theme-panel: #fff;
      --theme-border: #d0d0c8;
      --theme-text-primary: #1a1a1a;
      --theme-text-secondary: #3a3a3a;
      --theme-text-tertiary: #6a6a6a;
      --color-amber: #d2691e;
      --color-amber2: #ffbe4d;
      --color-success: #00e676;
      --font-body: "Barlow", sans-serif;
      --font-display: "Barlow Condensed", sans-serif;
      --font-mono: "IBM Plex Mono", monospace;
    }
    :root.dark {
      --theme-bg: #0e1118;
      --theme-bg2: #131720;
      --theme-bg3: #181d2a;
      --theme-panel: #12161f;
      --theme-border: #1e2535;
      --theme-text-primary: #e8eaf0;
      --theme-text-secondary: #cfd6e6;
      --theme-text-tertiary: #aab2c5;
    }

    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
      background: var(--theme-bg);
      color: var(--theme-text-primary);
      height: 100%;
      -webkit-font-smoothing: antialiased;
      transition: background-color .2s, color .2s;
    }

    /* ── App shell ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      max-width: 840px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--theme-border);
      background: var(--theme-panel);
      position: relative;
    }
    .header img {
      height: 36px;
      width: auto;
    }
    .theme-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--theme-text-tertiary);
      transition: border-color .15s, color .15s;
      font-size: 18px;
    }
    .theme-toggle:hover {
      border-color: var(--color-amber);
      color: var(--color-amber);
    }

    /* ── Messages area ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    /* ── Message bubble ── */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: msgIn .25s ease-out;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }

    .msg-label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--theme-text-tertiary);
      margin-bottom: 4px;
      padding: 0 2px;
    }
    .msg.user .msg-label { text-align: right; }

    .msg-body {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.6;
    }
    .msg.user .msg-body {
      background: var(--color-amber);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .msg-body {
      background: var(--theme-panel);
      border: 1px solid var(--theme-border);
      border-bottom-left-radius: 4px;
      color: var(--theme-text-primary);
    }

    /* ── Answer text ── */
    .answer-text { white-space: pre-wrap; }

    /* ── Business insight ── */
    .insight-block {
      margin-top: 10px;
      padding: 10px 14px;
      border-left: 3px solid var(--color-amber);
      background: var(--theme-bg2);
      border-radius: 0 8px 8px 0;
      font-size: 14px;
      color: var(--theme-text-secondary);
    }
    .insight-label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--color-amber);
      margin-bottom: 4px;
    }

    /* ── Data table (desktop) ── */
    .data-section { margin-top: 12px; }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--theme-border);
    }
    .data-table th {
      background: var(--theme-bg2);
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--theme-text-tertiary);
      padding: 8px 12px;
      text-align: left;
      font-weight: 600;
    }
    .data-table td {
      padding: 8px 12px;
      border-top: 1px solid var(--theme-border);
      color: var(--theme-text-secondary);
    }
    .data-table tr:hover td {
      background: var(--theme-bg2);
    }

    /* ── Data cards (mobile) ── */
    .data-cards { display: none; }
    .data-card {
      background: var(--theme-bg2);
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 8px;
    }
    .data-card-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 13px;
    }
    .data-card-key {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--theme-text-tertiary);
    }
    .data-card-val {
      color: var(--theme-text-secondary);
      text-align: right;
    }

    @media (max-width: 600px) {
      .data-table-wrap { display: none; }
      .data-cards { display: block; }
      .msg { max-width: 92%; }
    }

    /* ── Loading dots ── */
    .loading-dots { display: flex; gap: 4px; padding: 4px 0; }
    .loading-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--color-amber);
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: .15s; }
    .loading-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes dotPulse {
      0%, 80%, 100% { opacity: .25; transform: scale(.85); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── Error message ── */
    .error-text { color: #e05555; }

    /* ── Input area ── */
    .input-area {
      flex-shrink: 0;
      padding: 12px 20px 16px;
      border-top: 1px solid var(--theme-border);
      background: var(--theme-panel);
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-row textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--theme-border);
      border-radius: 10px;
      padding: 10px 14px;
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.5;
      background: var(--theme-bg);
      color: var(--theme-text-primary);
      outline: none;
      min-height: 44px;
      max-height: 140px;
      transition: border-color .15s;
    }
    .input-row textarea:focus { border-color: var(--color-amber); }
    .input-row textarea::placeholder { color: var(--theme-text-tertiary); }

    .send-btn {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 10px;
      background: var(--color-amber);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color .15s, opacity .15s;
    }
    .send-btn:hover { background: var(--color-amber2); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }
    .send-btn svg { width: 20px; height: 20px; }

    /* ── Chart ── */
    .msg.has-chart { max-width: 100%; }
    .chart-section {
      margin-top: 12px;
    }
    .chart-section canvas {
      border-radius: 8px;
      background: var(--theme-bg2);
      padding: 8px;
    }

    /* ── Scrollbar ── */
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb {
      background: var(--theme-border);
      border-radius: 3px;
    }

    /* ── Clear chat button ── */
    .clear-btn {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--theme-text-tertiary);
      font-size: 16px;
      transition: border-color .15s, color .15s;
    }
    .clear-btn:hover { border-color: #e05555; color: #e05555; }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <button class="clear-btn" onclick="clearChat()" title="Clear chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
      </button>
      <picture>
        <source media="(prefers-color-scheme: dark)" srcset="/oaas_logowhite.png" />
        <img src="/oaas_logoblack.png" alt="OaaS" id="headerLogo" />
      </picture>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" id="themeBtn">
        <svg id="moonIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="sunIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"/></svg>
      </button>
    </div>

    <!-- Chat messages -->
    <div class="messages" id="messages"></div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="Ask OaaS something..." autocomplete="off"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    // ── State ──
    const STORAGE_KEY = "oaas_chat_history";
    const API_URL = "/api/oaas-query";
    let messages = [];
    let isLoading = false;

    // ── Theme ──
    function initTheme() {
      const saved = localStorage.getItem("theme");
      if (saved === "dark" || (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.classList.add("dark");
      }
      updateThemeUI();
    }
    function toggleTheme() {
      document.documentElement.classList.toggle("dark");
      const isDark = document.documentElement.classList.contains("dark");
      localStorage.setItem("theme", isDark ? "dark" : "light");
      updateThemeUI();
    }
    function updateThemeUI() {
      const isDark = document.documentElement.classList.contains("dark");
      document.getElementById("moonIcon").style.display = isDark ? "none" : "block";
      document.getElementById("sunIcon").style.display = isDark ? "block" : "none";
      document.getElementById("headerLogo").src = isDark ? "/oaas_logowhite.png" : "/oaas_logoblack.png";
    }

    // ── Persistence ──
    function saveMessages() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(messages)); } catch {}
    }
    function loadMessages() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) { messages = JSON.parse(saved); return true; }
      } catch {}
      return false;
    }

    // ── Rendering ──
    function escapeHtml(str) {
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }

    function renderData(data) {
      if (!Array.isArray(data) || data.length === 0) return "";
      const keys = Object.keys(data[0]).filter(k => k !== "_id");

      // Table (desktop)
      let table = '<div class="data-table-wrap"><table class="data-table"><thead><tr>';
      keys.forEach(k => { table += `<th>${escapeHtml(k)}</th>`; });
      table += "</tr></thead><tbody>";
      data.forEach(row => {
        table += "<tr>";
        keys.forEach(k => { table += `<td>${escapeHtml(String(row[k] ?? ""))}</td>`; });
        table += "</tr>";
      });
      table += "</tbody></table></div>";

      // Cards (mobile)
      let cards = '<div class="data-cards">';
      data.forEach(row => {
        cards += '<div class="data-card">';
        keys.forEach(k => {
          cards += `<div class="data-card-row"><span class="data-card-key">${escapeHtml(k)}</span><span class="data-card-val">${escapeHtml(String(row[k] ?? ""))}</span></div>`;
        });
        cards += "</div>";
      });
      cards += "</div>";

      return `<div class="data-section">${table}${cards}</div>`;
    }

    function renderChart(msg) {
      return `<div class="chart-section"><canvas id="${msg.chartId}"></canvas></div>`;
    }

    function renderMessage(msg) {
      const div = document.createElement("div");
      div.className = `msg ${msg.role}${msg.chartData ? " has-chart" : ""}`;

      const label = msg.role === "user" ? "You" : "OaaS";
      let bodyContent = "";

      if (msg.role === "user") {
        bodyContent = `<div class="answer-text">${escapeHtml(msg.text)}</div>`;
      } else if (msg.loading) {
        bodyContent = '<div class="loading-dots"><span></span><span></span><span></span></div>';
      } else if (msg.error) {
        bodyContent = `<div class="error-text">${escapeHtml(msg.text)}</div>`;
      } else {
        bodyContent = `<div class="answer-text">${escapeHtml(msg.text)}</div>`;
        if (msg.insight) {
          bodyContent += `<div class="insight-block"><div class="insight-label">Business Insight</div>${escapeHtml(msg.insight)}</div>`;
        }
        if (msg.responseType === "chart" && msg.chartData) {
          bodyContent += renderChart(msg);
        } else if (msg.data) {
          bodyContent += renderData(msg.data);
        }
      }

      div.innerHTML = `<div class="msg-label">${label}</div><div class="msg-body">${bodyContent}</div>`;
      return div;
    }

    const chartInstances = {};

    function initAllCharts() {
      const isDark = document.documentElement.classList.contains("dark");
      const gridColor = isDark ? "rgba(255,255,255,0.07)" : "rgba(0,0,0,0.07)";
      const textColor = isDark ? "#aab2c5" : "#6a6a6a";
      const monoFont = { family: "'IBM Plex Mono', monospace", size: 10 };

      messages.forEach(msg => {
        if (!msg.chartData || !msg.chartId) return;
        const canvas = document.getElementById(msg.chartId);
        if (!canvas) return;
        if (chartInstances[msg.chartId]) chartInstances[msg.chartId].destroy();

        chartInstances[msg.chartId] = new Chart(canvas, {
          type: "line",
          data: {
            labels: msg.chartData.map(d => d.t),
            datasets: [{
              data: msg.chartData.map(d => d.v),
              borderColor: "#d2691e",
              backgroundColor: "rgba(210,105,30,0.12)",
              borderWidth: 2,
              pointRadius: msg.chartData.length > 80 ? 0 : 3,
              pointBackgroundColor: "#d2691e",
              tension: 0.3,
              fill: true,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: ctx => String(ctx.parsed.y.toFixed(2))
                }
              }
            },
            scales: {
              x: { ticks: { color: textColor, maxTicksLimit: 8, maxRotation: 0, font: monoFont }, grid: { color: gridColor } },
              y: { ticks: { color: textColor, font: monoFont }, grid: { color: gridColor } }
            }
          }
        });
      });
    }

    function renderAll() {
      const container = document.getElementById("messages");
      container.innerHTML = "";
      messages.forEach(msg => container.appendChild(renderMessage(msg)));
      scrollToBottom();
      initAllCharts();
    }

    function scrollToBottom() {
      const el = document.getElementById("messages");
      requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
    }

    // ── Chat logic ──
    async function sendMessage() {
      const input = document.getElementById("input");
      const text = input.value.trim();
      if (!text || isLoading) return;

      input.value = "";
      autoResizeInput();

      // User message
      messages.push({ role: "user", text });
      // Loading placeholder
      messages.push({ role: "assistant", loading: true, text: "" });
      renderAll();
      isLoading = true;
      updateSendBtn();

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });

        let data;
        const raw = await res.text();
        try { data = JSON.parse(raw); } catch {
          throw new Error("Invalid response from server.");
        }

        // Remove loading placeholder
        messages.pop();

        const answer = data.answer || data.output || raw;
        const assistantMsg = { role: "assistant", text: String(answer) };
        if (data.businessInsight) assistantMsg.insight = data.businessInsight;
        if (data.responseType) assistantMsg.responseType = data.responseType;
        if (data.responseType === "chart" && Array.isArray(data.chartData) && data.chartData.length > 0) {
          assistantMsg.chartData = data.chartData;
          assistantMsg.chartId = "chart-" + Date.now();
        } else if (Array.isArray(data.data) && data.data.length > 0) {
          assistantMsg.data = data.data;
        }
        messages.push(assistantMsg);

      } catch (err) {
        messages.pop();
        messages.push({ role: "assistant", error: true, text: err.message || "Something went wrong. Please try again." });
      }

      isLoading = false;
      updateSendBtn();
      saveMessages();
      renderAll();
    }

    function updateSendBtn() {
      document.getElementById("sendBtn").disabled = isLoading;
    }

    function clearChat() {
      messages = [{ role: "assistant", text: "Hi, I'm OaaS. Ask me about customers or operational data." }];
      saveMessages();
      renderAll();
    }

    // ── Input handling ──
    const inputEl = document.getElementById("input");
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    inputEl.addEventListener("input", autoResizeInput);

    function autoResizeInput() {
      const el = document.getElementById("input");
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 140) + "px";
    }

    // ── Init ──
    initTheme();
    if (!loadMessages() || messages.length === 0) {
      messages = [{ role: "assistant", text: "Hi, I'm OaaS. Ask me about customers or operational data." }];
      saveMessages();
    }
    renderAll();
  </script>
</body>
</html>
