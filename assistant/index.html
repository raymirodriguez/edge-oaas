<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OaaS Assistant</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    /* ── Theme tokens ── */
    :root {
      --theme-bg: #f5f5f0;
      --theme-bg2: #eaeae5;
      --theme-bg3: #e0e0db;
      --theme-panel: #fff;
      --theme-border: #d0d0c8;
      --theme-text-primary: #1a1a1a;
      --theme-text-secondary: #3a3a3a;
      --theme-text-tertiary: #6a6a6a;
      --color-amber: #d2691e;
      --color-amber2: #ffbe4d;
      --color-success: #00e676;
      --font-body: "Barlow", sans-serif;
      --font-display: "Barlow Condensed", sans-serif;
      --font-mono: "IBM Plex Mono", monospace;
    }
    :root.dark {
      --theme-bg: #0e1118;
      --theme-bg2: #131720;
      --theme-bg3: #181d2a;
      --theme-panel: #12161f;
      --theme-border: #1e2535;
      --theme-text-primary: #e8eaf0;
      --theme-text-secondary: #cfd6e6;
      --theme-text-tertiary: #aab2c5;
    }

    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
      background: var(--theme-bg);
      color: var(--theme-text-primary);
      height: 100%;
      -webkit-font-smoothing: antialiased;
      transition: background-color .2s, color .2s;
    }

    /* ── Screen system ── */
    .screen { display: none; }
    .screen.active { display: flex; }

    /* ── Login screen ── */
    #screen-login {
      min-height: 100vh;
      min-height: 100dvh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--theme-bg);
      padding: 24px;
    }
    .login-panel {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }
    #loginLogo { height: 150px; width: auto; }
    .login-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--theme-text-primary);
      text-align: center;
    }
    .login-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .login-input {
      width: 100%;
      border: 1px solid var(--theme-border);
      border-radius: 10px;
      padding: 11px 14px;
      font-family: var(--font-body);
      font-size: 15px;
      background: var(--theme-bg);
      color: var(--theme-text-primary);
      outline: none;
      transition: border-color .15s;
    }
    .login-input:focus { border-color: var(--color-amber); }
    .login-input::placeholder { color: var(--theme-text-tertiary); }
    .login-error {
      font-size: 13px;
      color: #e05555;
      min-height: 18px;
      text-align: center;
    }
    .login-btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 10px;
      background: var(--color-amber);
      color: #fff;
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color .15s, opacity .15s;
    }
    .login-btn:hover { background: var(--color-amber2); }
    .login-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Org selector screen ── */
    #screen-org {
      min-height: 100vh;
      min-height: 100dvh;
      flex-direction: column;
      background: var(--theme-bg);
    }
    .org-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--theme-border);
      background: var(--theme-panel);
    }
    .org-header img { height: 36px; width: auto; }
    .org-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 40px;
      overflow-y: auto;
    }
    .org-title {
      font-size: 15px;
      color: var(--theme-text-tertiary);
      margin-bottom: 32px;
      text-align: center;
    }
    .org-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      width: 100%;
      max-width: 820px;
    }
    @media (max-width: 540px) {
      .org-grid { grid-template-columns: 1fr; }
    }
    .org-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 22px;
      background: var(--theme-panel);
      border: 1px solid var(--theme-border);
      border-radius: 12px;
      cursor: pointer;
      transition: border-color .15s, background-color .15s;
      animation: msgIn .2s ease-out;
    }
    .org-card:hover {
      border-color: var(--color-amber);
      background: var(--theme-bg2);
    }
    .org-icon-wrap {
      flex-shrink: 0;
      width: 54px;
      height: 54px;
      border-radius: 10px;
      background: rgba(210, 105, 30, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-amber);
    }
    .org-icon-wrap svg { width: 28px; height: 28px; }
    .org-info { min-width: 0; }
    .org-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--theme-text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .org-sub {
      font-size: 13px;
      color: var(--theme-text-tertiary);
      margin-top: 2px;
    }

    /* ── App shell (chat screen) ── */
    #screen-chat {
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      max-width: 840px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Header ── */
    .header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--theme-border);
      background: var(--theme-panel);
      position: relative;
    }
    .header img {
      height: 36px;
      width: auto;
    }
    .theme-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--theme-text-tertiary);
      transition: border-color .15s, color .15s;
      font-size: 18px;
    }
    .theme-toggle:hover {
      border-color: var(--color-amber);
      color: var(--color-amber);
    }

    /* ── Messages area ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    /* ── Message bubble ── */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: msgIn .25s ease-out;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }

    .msg-label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--theme-text-tertiary);
      margin-bottom: 4px;
      padding: 0 2px;
    }
    .msg.user .msg-label { text-align: right; }

    .msg-body {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.6;
    }
    .msg.user .msg-body {
      background: var(--color-amber);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .msg-body {
      background: var(--theme-panel);
      border: 1px solid var(--theme-border);
      border-bottom-left-radius: 4px;
      color: var(--theme-text-primary);
    }

    /* ── Answer text ── */
    .answer-text { white-space: pre-wrap; }

    /* ── Business insight ── */
    .insight-block {
      margin-top: 10px;
      padding: 10px 14px;
      border-left: 3px solid var(--color-amber);
      background: var(--theme-bg2);
      border-radius: 0 8px 8px 0;
      font-size: 14px;
      color: var(--theme-text-secondary);
    }
    .insight-label {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--color-amber);
      margin-bottom: 4px;
    }

    /* ── Data table (desktop) ── */
    .data-section { margin-top: 12px; }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--theme-border);
    }
    .data-table th {
      background: var(--theme-bg2);
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--theme-text-tertiary);
      padding: 8px 12px;
      text-align: left;
      font-weight: 600;
    }
    .data-table td {
      padding: 8px 12px;
      border-top: 1px solid var(--theme-border);
      color: var(--theme-text-secondary);
    }
    .data-table tr:hover td {
      background: var(--theme-bg2);
    }

    /* ── Data cards (mobile) ── */
    .data-cards { display: none; }
    .data-card {
      background: var(--theme-bg2);
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 8px;
    }
    .data-card-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 13px;
    }
    .data-card-key {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--theme-text-tertiary);
    }
    .data-card-val {
      color: var(--theme-text-secondary);
      text-align: right;
    }

    @media (max-width: 600px) {
      .data-table-wrap { display: none; }
      .data-cards { display: block; }
      .msg { max-width: 92%; }
    }

    /* ── Loading dots ── */
    .loading-dots { display: flex; gap: 4px; padding: 4px 0; }
    .loading-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--color-amber);
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: .15s; }
    .loading-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes dotPulse {
      0%, 80%, 100% { opacity: .25; transform: scale(.85); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── Error message ── */
    .error-text { color: #e05555; }

    /* ── Input area ── */
    .input-area {
      flex-shrink: 0;
      padding: 12px 20px 16px;
      border-top: 1px solid var(--theme-border);
      background: var(--theme-panel);
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-row textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--theme-border);
      border-radius: 10px;
      padding: 10px 14px;
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.5;
      background: var(--theme-bg);
      color: var(--theme-text-primary);
      outline: none;
      min-height: 44px;
      max-height: 140px;
      transition: border-color .15s;
    }
    .input-row textarea:focus { border-color: var(--color-amber); }
    .input-row textarea::placeholder { color: var(--theme-text-tertiary); }

    .send-btn {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 10px;
      background: var(--color-amber);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color .15s, opacity .15s;
    }
    .send-btn:hover { background: var(--color-amber2); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }
    .send-btn svg { width: 20px; height: 20px; }

    /* ── Chart ── */
    .msg.has-chart { max-width: 100%; }
    .chart-section { margin-top: 12px; }
    .chart-section canvas {
      border-radius: 8px;
      background: var(--theme-bg2);
      padding: 8px;
    }

    /* ── Heat map ── */
    .heatmap-section { margin-top: 12px; overflow-x: auto; }
    .heatmap-section canvas { display: block; max-width: 100%; border-radius: 8px; }

    /* ── PDF button ── */
    .pdf-btn-wrap { margin-top: 10px; }
    .pdf-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      background: none;
      color: var(--theme-text-tertiary);
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: border-color .15s, color .15s, background-color .15s;
    }
    .pdf-btn:hover { border-color: var(--color-amber); color: var(--color-amber); background: rgba(210,105,30,0.06); }
    .pdf-btn svg { width: 12px; height: 12px; flex-shrink: 0; }

    /* ── Session badge ── */
    .session-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--theme-text-tertiary);
      opacity: 0.45;
      padding: 4px 2px 0;
      letter-spacing: 0.05em;
      user-select: all;
    }

    /* ── Scrollbar ── */
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb {
      background: var(--theme-border);
      border-radius: 3px;
    }

    /* ── Header left buttons ── */
    .header-left {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 8px;
    }
    .clear-btn, .session-btn {
      background: none;
      border: 1px solid var(--theme-border);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--theme-text-tertiary);
      font-size: 16px;
      transition: border-color .15s, color .15s;
    }
    .clear-btn:hover { border-color: #e05555; color: #e05555; }
    .session-btn:hover { border-color: var(--color-amber); color: var(--color-amber); }
  </style>
</head>
<body>

  <!-- ── Login Screen ── -->
  <div id="screen-login" class="screen">
    <div class="login-panel">
      <img src="/oaas_logoblack.png" alt="OaaS" class="theme-logo" id="loginLogo" />
      <div class="login-title">Sign in to continue</div>
      <div class="login-form">
        <input class="login-input" type="text" id="loginUser" placeholder="Username" autocomplete="username" />
        <input class="login-input" type="password" id="loginPass" placeholder="Password" autocomplete="current-password" />
        <div class="login-error" id="loginError"></div>
        <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
      </div>
    </div>
  </div>

  <!-- ── Org Selector Screen ── -->
  <div id="screen-org" class="screen">
    <div class="org-header">
      <img src="/oaas_logoblack.png" alt="OaaS" class="theme-logo" id="orgLogo" />
    </div>
    <div class="org-body">
      <div class="org-title">Select an organization to continue</div>
      <div class="org-grid" id="orgGrid"></div>
    </div>
  </div>

  <!-- ── Chat Screen ── -->
  <div id="screen-chat" class="screen">
    <div class="header">
      <div class="header-left">
        <button class="clear-btn" onclick="clearChat()" title="Clear chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        </button>
        <button class="session-btn" onclick="newSession()" title="New session (back to login)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>
      <picture>
        <source media="(prefers-color-scheme: dark)" srcset="/oaas_logowhite.png" />
        <img src="/oaas_logoblack.png" alt="OaaS" class="theme-logo" id="headerLogo" />
      </picture>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
        <svg id="moonIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="sunIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"/></svg>
      </button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="Ask OaaS something..." autocomplete="off"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="session-badge" id="sessionBadge"></div>
    </div>
  </div>

  <script>
    // ── State ──
    const STORAGE_KEY = "oaas_chat_history";
    const SESSION_KEY = "oaas_session_id";
    const API_URL = "/api/oaas-query";
    let messages = [];
    let isLoading = false;
    let credentials = null;   // { username, password }
    let selectedOrg = null;   // { id, name }

    // ── Session ID ──
    function getSessionId() {
      let id = sessionStorage.getItem(SESSION_KEY);
      if (!id) {
        id = (typeof crypto !== "undefined" && crypto.randomUUID)
          ? crypto.randomUUID()
          : Math.random().toString(36).slice(2) + Date.now().toString(36) + Math.random().toString(36).slice(2);
        sessionStorage.setItem(SESSION_KEY, id);
      }
      return id;
    }
    let sessionId = getSessionId();

    // ── Screen management ──
    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    // ── Theme ──
    function initTheme() {
      const saved = localStorage.getItem("theme");
      if (saved === "dark" || (!saved && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.classList.add("dark");
      }
      updateThemeUI();
    }
    function toggleTheme() {
      document.documentElement.classList.toggle("dark");
      const isDark = document.documentElement.classList.contains("dark");
      localStorage.setItem("theme", isDark ? "dark" : "light");
      updateThemeUI();
    }
    function updateThemeUI() {
      const isDark = document.documentElement.classList.contains("dark");
      document.getElementById("moonIcon").style.display = isDark ? "none" : "block";
      document.getElementById("sunIcon").style.display = isDark ? "block" : "none";
      document.querySelectorAll(".theme-logo").forEach(img => {
        img.src = isDark ? "/oaas_logowhite.png" : "/oaas_logoblack.png";
      });
    }

    // ── Login ──
    async function doLogin() {
      const username = document.getElementById("loginUser").value.trim();
      const password = document.getElementById("loginPass").value;
      const errorEl = document.getElementById("loginError");
      const btn = document.getElementById("loginBtn");

      errorEl.textContent = "";
      if (!username || !password) {
        errorEl.textContent = "Please enter your username and password.";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Signing in…";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action: "login", username, password, sessionId }),
        });
        const raw = await res.text();
        let data;
        try { data = JSON.parse(raw); } catch { throw new Error("Invalid server response."); }

          showScreen("screen-org");

    function drawHeatMap(canvasId, heatmapData) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;

      const { rows, cols, values, label } = heatmapData;
      const isDark = document.documentElement.classList.contains("dark");
      const textColor = isDark ? "#aab2c5" : "#6a6a6a";
      const borderColor = isDark ? "#1e2535" : "#d0d0c8";
      const bgColor = isDark ? "#131720" : "#eaeae5";

      const LABEL_W = 52;
      const COL_H = 28;
      const TOP_PAD = label ? 30 : 8;
      const RIGHT_PAD = 8;
      const LEGEND_H = 14;
      const LEGEND_PAD = 38;

      const containerW = (canvas.parentElement ? canvas.parentElement.clientWidth : 600) - 2;
      const cellW = Math.max(28, Math.floor((containerW - LABEL_W - RIGHT_PAD) / cols.length));
      const cellH = 30;
      const gridW = cols.length * cellW;
      const gridH = rows.length * cellH;

      canvas.width = LABEL_W + gridW + RIGHT_PAD;
      canvas.height = TOP_PAD + gridH + COL_H + LEGEND_PAD;
      canvas.style.maxWidth = "100%";

      const ctx = canvas.getContext("2d");

      function lerp(a, b, t) { return Math.round(a + (b - a) * Math.max(0, Math.min(1, t))); }
      function getColor(v, mn, mx) {
        if (mx === mn) return "#d2691e";
        const t = (v - mn) / (mx - mn);
        let r, g, b;
        if (t < 0.25) {
          const p = t / 0.25;
          r = lerp(30, 44, p); g = lerp(90, 160, p); b = lerp(200, 210, p);
        } else if (t < 0.5) {
          const p = (t - 0.25) / 0.25;
          r = lerp(44, 255, p); g = lerp(160, 200, p); b = lerp(210, 50, p);
        } else if (t < 0.75) {
          const p = (t - 0.5) / 0.25;
          r = lerp(255, 210, p); g = lerp(200, 105, p); b = lerp(50, 30, p);
        } else {
          const p = (t - 0.75) / 0.25;
          r = lerp(210, 160, p); g = lerp(105, 20, p); b = lerp(30, 20, p);
        }
        return `rgb(${r},${g},${b})`;
      }

      let min = Infinity, max = -Infinity;
      values.forEach(row => row.forEach(v => { if (v < min) min = v; if (v > max) max = v; }));

      // Background
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Title label
      if (label) {
        ctx.font = '500 10px "IBM Plex Mono"';
        ctx.fillStyle = "#d2691e";
        ctx.textAlign = "left";
        ctx.fillText(label.toUpperCase(), LABEL_W, 17);
      }

      // Cells
      values.forEach((row, ri) => {
        row.forEach((v, ci) => {
          const x = LABEL_W + ci * cellW;
          const y = TOP_PAD + ri * cellH;
          ctx.fillStyle = getColor(v, min, max);
          ctx.fillRect(x + 1, y + 1, cellW - 2, cellH - 2);
          if (cellW >= 38 && cellH >= 22) {
            ctx.font = '9px "IBM Plex Mono"';
            ctx.fillStyle = "rgba(255,255,255,0.88)";
            ctx.textAlign = "center";
            ctx.fillText(String(v), x + cellW / 2, y + cellH / 2 + 3);
          }
        });
      });

      // Row labels
      ctx.font = '10px "IBM Plex Mono"';
      ctx.fillStyle = textColor;
      ctx.textAlign = "right";
      rows.forEach((rowLabel, ri) => {
        ctx.fillText(rowLabel, LABEL_W - 6, TOP_PAD + ri * cellH + cellH / 2 + 4);
      });

      // Col labels
      ctx.font = '9px "IBM Plex Mono"';
      ctx.fillStyle = textColor;
      ctx.textAlign = "center";
      cols.forEach((col, ci) => {
        ctx.fillText(col, LABEL_W + ci * cellW + cellW / 2, TOP_PAD + gridH + 16);
      });

      // Legend gradient
      const legendX = LABEL_W;
      const legendY = TOP_PAD + gridH + COL_H + 6;
      const legendW = Math.min(gridW, 200);
      const steps = 80;
      for (let i = 0; i < steps; i++) {
        const v = min + (max - min) * (i / steps);
        ctx.fillStyle = getColor(v, min, max);
        ctx.fillRect(legendX + (i / steps) * legendW, legendY, Math.ceil(legendW / steps) + 1, LEGEND_H);
      }
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = 1;
      ctx.strokeRect(legendX, legendY, legendW, LEGEND_H);

      // Legend min / mid / max labels
      ctx.font = '9px "IBM Plex Mono"';
      ctx.fillStyle = textColor;
      ctx.textAlign = "left";
      ctx.fillText(String(min), legendX, legendY + LEGEND_H + 12);
      ctx.textAlign = "right";
      ctx.fillText(String(max), legendX + legendW, legendY + LEGEND_H + 12);
      ctx.textAlign = "center";
      ctx.fillText(String(Math.round((min + max) / 2)), legendX + legendW / 2, legendY + LEGEND_H + 12);
    }

    function r1(v) { return (Math.round(v * 10) / 10).toString(); }
    function r2(v) { return (Math.round(v * 100) / 100).toString(); }

    function computeInsights(msg, type) {
      const RATE = 0.12;
      const out = { stats: null, trend: null, anomalies: [], peakItems: [], costEstimate: null, recommendations: [] };

      if (type === "chart" && msg.chartData && msg.chartData.length > 0) {
        const vals = msg.chartData.map(d => d.v);
        const n = vals.length;
        const sorted = [...vals].sort((a, b) => a - b);
        const mean = vals.reduce((s, v) => s + v, 0) / n;
        const variance = vals.reduce((s, v) => s + (v - mean) ** 2, 0) / n;
        const stdDev = Math.sqrt(variance);

        out.stats = { "Min": r1(sorted[0]) + " A", "Max": r1(sorted[n - 1]) + " A", "Avg": r1(mean) + " A", "Std Dev": r1(stdDev) + " A" };

        const fAvg = vals.slice(0, Math.floor(n / 3)).reduce((s, v) => s + v, 0) / Math.floor(n / 3);
        const lAvg = vals.slice(Math.floor(n * 2 / 3)).reduce((s, v) => s + v, 0) / Math.ceil(n / 3);
        const chg = ((lAvg - fAvg) / fAvg) * 100;
        out.trend = {
          direction: chg > 5 ? "Increasing ▲" : chg < -5 ? "Decreasing ▼" : "Stable →",
          detail: Math.abs(chg) < 5 ? "Load is stable over the observed period."
            : `Average load ${chg > 0 ? "increased" : "decreased"} ${Math.abs(Math.round(chg))}% from start to end of period.`,
        };

        const threshold = mean + 2 * stdDev;
        out.anomalies = msg.chartData.filter(d => d.v > threshold).map(d => `${d.t}: ${r1(d.v)} A`).slice(0, 6);
        out.peakItems = [...msg.chartData].sort((a, b) => b.v - a.v).slice(0, 3).map(d => `${d.t}  →  ${r1(d.v)} A`);

        const totalKwh = vals.reduce((s, v) => s + (480 * v / 1000) * (1 / 60), 0);
        out.costEstimate = { label: "Est. Energy (period)", kwh: r2(totalKwh), cost: r2(totalKwh * RATE), rate: RATE, note: "Assumes 480 V DC nominal" };

        if (out.anomalies.length > 0)
          out.recommendations.push(`${out.anomalies.length} load spike(s) detected above ${Math.round(threshold)} A — investigate equipment cycling at peak times.`);
        if (Math.abs(chg) > 5)
          out.recommendations.push(`Load is ${chg > 0 ? "increasing" : "decreasing"} — verify this aligns with the planned production schedule.`);
        if (stdDev / mean > 0.5)
          out.recommendations.push("High variability detected (σ/μ > 0.5) — intermittent heavy equipment is likely driving demand peaks.");
        const pctAbove = Math.round(vals.filter(v => v > mean).length / n * 100);
        out.recommendations.push(`${pctAbove}% of readings exceed the period average — demand smoothing strategies could reduce peak tariffs.`);
      }

      if (type === "heatmap" && msg.heatmapData) {
        const { rows, cols, values: grid } = msg.heatmapData;
        const flat = grid.flat();
        const n = flat.length;
        const sorted = [...flat].sort((a, b) => a - b);
        const mean = flat.reduce((s, v) => s + v, 0) / n;
        const variance = flat.reduce((s, v) => s + (v - mean) ** 2, 0) / n;
        const stdDev = Math.sqrt(variance);

        let peakV = -Infinity, peakR = "", peakC = "", minV = Infinity, minR = "", minC = "";
        grid.forEach((row, ri) => row.forEach((v, ci) => {
          if (v > peakV) { peakV = v; peakR = rows[ri]; peakC = cols[ci]; }
          if (v < minV) { minV = v; minR = rows[ri]; minC = cols[ci]; }
        }));

        const bhIdx = cols.reduce((acc, c, i) => { const h = parseInt(c); if (h >= 8 && h < 18) acc.push(i); return acc; }, []);
        const bhVals = grid.flatMap((row, ri) => bhIdx.map(ci => grid[ri][ci]));
        const offVals = grid.flatMap((row, ri) => row.filter((_, ci) => !bhIdx.includes(ci)));
        const bhAvg = bhVals.reduce((s, v) => s + v, 0) / bhVals.length;
        const offAvg = offVals.reduce((s, v) => s + v, 0) / offVals.length;
        const bhPremium = Math.round(((bhAvg - offAvg) / offAvg) * 100);

        const wkdayFlat = grid.filter((_, ri) => !["Sat", "Sun"].includes(rows[ri])).flat();
        const wkendFlat = grid.filter((_, ri) => ["Sat", "Sun"].includes(rows[ri])).flat();
        const wkdayAvg = Math.round(wkdayFlat.reduce((s, v) => s + v, 0) / wkdayFlat.length);
        const wkendAvg = wkendFlat.length ? Math.round(wkendFlat.reduce((s, v) => s + v, 0) / wkendFlat.length) : null;

        out.stats = { "Min": Math.round(sorted[0]) + " kW", "Max": Math.round(sorted[n - 1]) + " kW", "Avg": Math.round(mean) + " kW", "Std Dev": Math.round(stdDev) + " kW" };
        out.trend = {
          direction: "Business Hours ▲",
          detail: `Business hours avg ${Math.round(bhAvg)} kW vs off-hours avg ${Math.round(offAvg)} kW (${bhPremium}% higher).`,
        };
        out.peakItems = [
          `Peak: ${peakR} ${peakC}  →  ${peakV} kW`,
          `Minimum: ${minR} ${minC}  →  ${minV} kW`,
          `Weekday avg: ${wkdayAvg} kW`,
          ...(wkendAvg !== null ? [`Weekend avg: ${wkendAvg} kW`] : []),
        ];

        const totalKwh = Math.round(flat.reduce((s, v) => s + v * 2, 0));
        out.costEstimate = { label: "Est. Weekly Energy", kwh: totalKwh.toLocaleString(), cost: Math.round(totalKwh * RATE).toLocaleString(), rate: RATE, note: "kW values × 2 h/cell × 7 days" };

        out.recommendations.push(`Peak load of ${peakV} kW at ${peakR} ${peakC} — prioritize OaaS optimization during this window.`);
        if (bhPremium > 20) out.recommendations.push(`Business hours consumption is ${bhPremium}% above off-hours — significant demand management opportunity exists.`);
        if (wkendAvg !== null && wkendAvg / wkdayAvg > 0.4)
          out.recommendations.push(`Weekend loads average ${wkendAvg} kW — review non-production equipment for scheduled shutdown opportunities.`);
        out.recommendations.push(`Baseline floor of ${minV} kW at ${minR} ${minC} — this represents phantom/standby load that can be targeted for reduction.`);
      }

      if (type === "table" && msg.data && msg.data.length > 0) {
        const numCol = Object.keys(msg.data[0]).find(k => k === "value") ||
                       Object.keys(msg.data[0]).find(k => msg.data.some(r => !isNaN(parseFloat(r[k]))));
        if (numCol) {
          const vals = msg.data.map(r => parseFloat(r[numCol])).filter(v => !isNaN(v));
          const sorted = [...vals].sort((a, b) => a - b);
          const mean = vals.reduce((s, v) => s + v, 0) / vals.length;
          out.stats = { "Count": vals.length.toString(), "Min": r1(sorted[0]), "Max": r1(sorted[sorted.length - 1]), "Avg": r1(mean) };
        }
        out.recommendations.push(`Dataset contains ${msg.data.length} records — export to Edge Stream for deeper trend analysis.`);
      }

      return out;
    }

    function generatePDF(type, id) {
      if (!window.jspdf) { alert("PDF library not loaded yet. Please try again."); return; }
      const { jsPDF } = window.jspdf;

      let msg;
      if (type === "chart")   msg = messages.find(m => m.chartId === id);
      if (type === "heatmap") msg = messages.find(m => m.heatmapId === id);
      if (type === "table")   msg = messages.find(m => m.tableId === id);
      if (!msg) return;

      const doc = new jsPDF({ orientation: "p", unit: "mm", format: "a4" });
      const PW = doc.internal.pageSize.getWidth();
      const PH = doc.internal.pageSize.getHeight();
      const M = 18;
      const CW = PW - M * 2;
      const now = new Date();
      const AMBER = [210, 105, 30];
      const AMBER_LIGHT = [253, 246, 238];

      function addPage() {
        doc.addPage();
        doc.setFillColor(...AMBER);
        doc.rect(0, 0, PW, 8, "F");
        doc.setFont("helvetica", "bold"); doc.setFontSize(7); doc.setTextColor(255, 255, 255);
        doc.text("OaaS — Energy Data Report (cont.)", M, 5.5);
        return 14;
      }
      function chk(y, need) { return y + need > PH - 14 ? addPage() : y; }

      function secTitle(title, y) {
        y = chk(y, 10);
        doc.setFont("helvetica", "bold"); doc.setFontSize(8); doc.setTextColor(...AMBER);
        doc.text(title.toUpperCase(), M, y);
        doc.setDrawColor(...AMBER); doc.setLineWidth(0.3);
        doc.line(M + doc.getTextWidth(title.toUpperCase()) + 2, y - 0.5, PW - M, y - 0.5);
        return y + 5;
      }
      function divider(y) {
        doc.setDrawColor(210, 210, 205); doc.setLineWidth(0.3);
        doc.line(M, y, PW - M, y);
        return y + 5;
      }

      // ── Header ──
      doc.setFillColor(...AMBER);
      doc.rect(0, 0, PW, 13, "F");
      doc.setFont("helvetica", "bold"); doc.setFontSize(11); doc.setTextColor(255, 255, 255);
      doc.text("OaaS — Energy Data Report", M, 9);
      doc.setFont("helvetica", "normal"); doc.setFontSize(8);
      doc.text(now.toLocaleString(), PW - M, 9, { align: "right" });

      let y = 20;

      // ── Meta ──
      doc.setFontSize(8); doc.setTextColor(100, 100, 100);
      const meta = [selectedOrg ? "Organization: " + selectedOrg.name : null, "Date: " + now.toLocaleDateString()].filter(Boolean).join("    ·    ");
      doc.text(meta, M, y); y += 7;

      // ── Summary ──
      y = secTitle("Summary", y);
      doc.setFont("helvetica", "normal"); doc.setFontSize(9); doc.setTextColor(40, 40, 40);
      const sumLines = doc.splitTextToSize(msg.text || "", CW).slice(0, 8);
      y = chk(y, sumLines.length * 4.5);
      doc.text(sumLines, M, y); y += sumLines.length * 4.5 + 4;

      if (msg.insight) {
        const iLines = doc.splitTextToSize(msg.insight, CW - 10);
        const bh = 7 + iLines.length * 4.5;
        y = chk(y, bh + 4);
        doc.setFillColor(...AMBER_LIGHT); doc.roundedRect(M, y, CW, bh, 2, 2, "F");
        doc.setDrawColor(...AMBER); doc.setLineWidth(0.6); doc.line(M, y, M, y + bh);
        doc.setFont("helvetica", "bold"); doc.setFontSize(7); doc.setTextColor(...AMBER);
        doc.text("LLM INSIGHT", M + 4, y + 4.5);
        doc.setFont("helvetica", "normal"); doc.setFontSize(8); doc.setTextColor(50, 50, 50);
        doc.text(iLines, M + 4, y + 8.5); y += bh + 5;
      }

      y = divider(y);

      // ── Visual ──
      if (type === "chart" || type === "heatmap") {
        const canvas = document.getElementById(type === "chart" ? msg.chartId : msg.heatmapId);
        if (canvas && canvas.width > 0) {
          y = secTitle(type === "chart" ? "Chart" : "Heat Map", y);
          const imgData = canvasWithBg(canvas, "#f5f5f0");
          const imgH = Math.min(CW / (canvas.width / canvas.height), 95);
          y = chk(y, imgH + 4);
          doc.addImage(imgData, "PNG", M, y, CW, imgH);
          y += imgH + 6;
        }
      }
      if (type === "table" && msg.data) {
        y = secTitle("Data Table", y);
        const cols = Object.keys(msg.data[0] || {});
        doc.autoTable({
          head: [cols.map(c => c.toUpperCase())],
          body: msg.data.map(row => cols.map(c => String(row[c] ?? ""))),
          startY: y, margin: { left: M, right: M },
          styles: { fontSize: 8, cellPadding: 2 },
          headStyles: { fillColor: AMBER, textColor: [255, 255, 255], fontStyle: "bold" },
          alternateRowStyles: { fillColor: [245, 245, 240] },
        });
        y = doc.lastAutoTable.finalY + 6;
      }

      y = divider(y);

      // ── Compute insights ──
      const ins = computeInsights(msg, type);

      // ── Key Statistics ──
      if (ins.stats) {
        y = secTitle("Key Statistics", y);
        const keys = Object.keys(ins.stats);
        const bw = (CW - (keys.length - 1) * 4) / keys.length;
        y = chk(y, 18);
        keys.forEach((k, i) => {
          const bx = M + i * (bw + 4);
          doc.setFillColor(245, 245, 240); doc.roundedRect(bx, y, bw, 14, 2, 2, "F");
          doc.setDrawColor(205, 205, 198); doc.setLineWidth(0.3); doc.roundedRect(bx, y, bw, 14, 2, 2, "S");
          doc.setFont("helvetica", "normal"); doc.setFontSize(7); doc.setTextColor(120, 120, 120);
          doc.text(k.toUpperCase(), bx + bw / 2, y + 5, { align: "center" });
          doc.setFont("helvetica", "bold"); doc.setFontSize(9); doc.setTextColor(...AMBER);
          doc.text(ins.stats[k], bx + bw / 2, y + 11, { align: "center" });
        });
        y += 20;
      }

      // ── Trend & Analysis ──
      if (ins.trend || ins.anomalies.length > 0 || ins.peakItems.length > 0) {
        y = secTitle("Trend & Analysis", y);
        if (ins.trend) {
          y = chk(y, 12);
          doc.setFont("helvetica", "bold"); doc.setFontSize(8); doc.setTextColor(40, 40, 40);
          const tLabel = "Trend: ";
          doc.text(tLabel, M, y);
          doc.setTextColor(...AMBER);
          doc.text(ins.trend.direction, M + doc.getTextWidth(tLabel), y);
          y += 5;
          doc.setFont("helvetica", "normal"); doc.setTextColor(80, 80, 80);
          const dLines = doc.splitTextToSize(ins.trend.detail, CW - 4);
          doc.text(dLines, M, y); y += dLines.length * 4.5 + 3;
        }
        if (ins.peakItems.length > 0) {
          y = chk(y, ins.peakItems.length * 5 + 6);
          doc.setFont("helvetica", "bold"); doc.setFontSize(8); doc.setTextColor(40, 40, 40);
          doc.text("Peak Periods:", M, y); y += 5;
          doc.setFont("helvetica", "normal"); doc.setTextColor(80, 80, 80);
          ins.peakItems.forEach(item => { doc.text("• " + item, M + 4, y); y += 4.5; });
          y += 2;
        }
        if (ins.anomalies.length > 0) {
          y = chk(y, ins.anomalies.length * 5 + 6);
          doc.setFont("helvetica", "bold"); doc.setFontSize(8); doc.setTextColor(180, 55, 55);
          doc.text("Anomalies Detected (" + ins.anomalies.length + "):", M, y); y += 5;
          doc.setFont("helvetica", "normal"); doc.setTextColor(80, 80, 80);
          ins.anomalies.forEach(a => { doc.text("! " + a, M + 4, y); y += 4.5; });
          y += 2;
        }
      }

      // ── Cost Estimate ──
      if (ins.costEstimate) {
        y = chk(y, 32);
        y = secTitle("Energy Cost Estimate", y);
        const ce = ins.costEstimate;
        doc.setFillColor(...AMBER_LIGHT); doc.roundedRect(M, y, CW, 20, 2, 2, "F");
        doc.setDrawColor(...AMBER); doc.setLineWidth(0.4); doc.roundedRect(M, y, CW, 20, 2, 2, "S");

        doc.setFont("helvetica", "normal"); doc.setFontSize(8); doc.setTextColor(80, 80, 80);
        doc.text(ce.label + ":", M + 6, y + 7);
        doc.setFont("helvetica", "bold"); doc.setFontSize(11); doc.setTextColor(...AMBER);
        doc.text(ce.kwh + " kWh", M + 6, y + 15);

        doc.setFont("helvetica", "normal"); doc.setFontSize(8); doc.setTextColor(80, 80, 80);
        doc.text("Estimated Cost (@ $" + ce.rate + "/kWh):", M + CW / 2, y + 7);
        doc.setFont("helvetica", "bold"); doc.setFontSize(11); doc.setTextColor(...AMBER);
        doc.text("$" + ce.cost, M + CW / 2, y + 15);

        doc.setFont("helvetica", "normal"); doc.setFontSize(7); doc.setTextColor(140, 140, 140);
        doc.text("* " + ce.note, M + 6, y + 19.5);
        y += 26;
      }

      // ── Recommendations ──
      if (ins.recommendations.length > 0) {
        y = secTitle("Recommendations", y);
        ins.recommendations.forEach((rec, i) => {
          const rLines = doc.splitTextToSize((i + 1) + ". " + rec, CW - 6);
          y = chk(y, rLines.length * 4.5 + 3);
          doc.setFont("helvetica", "normal"); doc.setFontSize(8.5); doc.setTextColor(40, 40, 40);
          doc.text(rLines, M + 3, y); y += rLines.length * 4.5 + 3;
        });
      }

      // ── Footer on all pages ──
      const totalPages = doc.internal.getNumberOfPages();
      for (let p = 1; p <= totalPages; p++) {
        doc.setPage(p);
        doc.setFontSize(7); doc.setTextColor(160, 160, 160);
        doc.text("Generated by OaaS — Pivotol AI", M, PH - 6);
        doc.text("Page " + p + " of " + totalPages, PW / 2, PH - 6, { align: "center" });
        doc.text("pivotolai.com", PW - M, PH - 6, { align: "right" });
      }

      doc.save("oaas-report-" + now.toISOString().slice(0, 10) + ".pdf");
    }

    function initAllHeatMaps() {
      messages.forEach(msg => {
        if (!msg.heatmapData || !msg.heatmapId) return;
        drawHeatMap(msg.heatmapId, msg.heatmapData);
      });
    }

    function renderAll() {
      const container = document.getElementById("messages");
      container.innerHTML = "";
      messages.forEach(msg => container.appendChild(renderMessage(msg)));
      scrollToBottom();
      initAllCharts();
      initAllHeatMaps();
    }

    function scrollToBottom() {
      const el = document.getElementById("messages");
      requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
    }

    // ── Chat logic ──
    async function sendMessage() {
      const input = document.getElementById("input");
      const text = input.value.trim();
      if (!text || isLoading) return;

      const wantsHeatMap = /heat\s*map/i.test(text);
      const wantsChart = !wantsHeatMap && /\b(line|bar|area)\s*(chart|graph)\b|\bplot\b|\b(show|display|present|visualize)\s+(me\s+)?(it|that|this|the\s+data|data)\b/i.test(text);

      input.value = "";
      autoResizeInput();

      messages.push({ role: "user", text });
      messages.push({ role: "assistant", loading: true, text: "" });
      renderAll();
      isLoading = true;
      updateSendBtn();

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: text,
            sessionId,
            orgId: selectedOrg?.id,
            orgName: selectedOrg?.name,
          }),
        });

        let data;
        const raw = await res.text();
        try { data = JSON.parse(raw); } catch {
          throw new Error("Invalid response from server.");
        }

        messages.pop();

        if (data.success === false) {
          messages.push({ role: "assistant", error: true, text: data.error || "The query failed." });
        } else {
          const answer = data.answer || data.output || raw;
          const assistantMsg = { role: "assistant", text: String(answer) };
          if (data.businessInsight) assistantMsg.insight = data.businessInsight;
          assistantMsg.responseType = data.responseType || "text";

          if (data.responseType === "chart" && Array.isArray(data.chartData) && data.chartData.length > 0) {
            assistantMsg.chartData = data.chartData;
            assistantMsg.chartId = "chart-" + Date.now();
          } else if (data.responseType === "table" && Array.isArray(data.data) && data.data.length > 0) {
            assistantMsg.data = data.data;
            assistantMsg.tableId = "table-" + Date.now();
          } else if (data.responseType === "heatmap" && data.heatmapData) {
            assistantMsg.heatmapData = data.heatmapData;
            assistantMsg.heatmapId = "heatmap-" + Date.now();
          }

          messages.push(assistantMsg);
        }

      } catch (err) {
        messages.pop();
        messages.push({ role: "assistant", error: true, text: err.message || "Something went wrong. Please try again." });
      }

      // Chart trigger — fires after API response regardless of success/failure
      if (wantsChart) {
        const lastMsg = messages[messages.length - 1];
        if (lastMsg && lastMsg.role === "assistant" && !lastMsg.chartData) {
          lastMsg.responseType = "chart";
          lastMsg.chartData = generateDemoChartData();
          lastMsg.chartId = "chart-" + Date.now();
          delete lastMsg.error;
        }
      }

      // Heat map trigger — fires after API response regardless of success/failure
      if (wantsHeatMap) {
        const lastMsg = messages[messages.length - 1];
        if (lastMsg && lastMsg.role === "assistant" && !lastMsg.heatmapData) {
          lastMsg.responseType = "heatmap";
          lastMsg.heatmapData = generateDemoHeatmapData();
          lastMsg.heatmapId = "heatmap-" + Date.now();
          delete lastMsg.error;
        }
      }

      isLoading = false;
      updateSendBtn();
      saveMessages();
      renderAll();
    }

    function updateSendBtn() {
      document.getElementById("sendBtn").disabled = isLoading;
    }

    function clearChat() {
      const orgName = selectedOrg?.name || "your organization";
      messages = [{ role: "assistant", text: `Hi, I'm OaaS. You're now viewing ${orgName}. What would you like to know?` }];
      saveMessages();
      renderAll();
    }

    function newSession() {
      sessionId = (typeof crypto !== "undefined" && crypto.randomUUID)
        ? crypto.randomUUID()
        : Math.random().toString(36).slice(2) + Date.now().toString(36) + Math.random().toString(36).slice(2);
      sessionStorage.setItem(SESSION_KEY, sessionId);
      credentials = null;
      selectedOrg = null;
      messages = [];
      try { localStorage.removeItem(STORAGE_KEY); } catch {}
      document.getElementById("loginUser").value = "";
      document.getElementById("loginPass").value = "";
      document.getElementById("loginError").textContent = "";
      showScreen("screen-login");
    }

    // ── Input handling ──
    document.getElementById("input").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    document.getElementById("input").addEventListener("input", autoResizeInput);

    document.getElementById("loginUser").addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); document.getElementById("loginPass").focus(); }
    });
    document.getElementById("loginPass").addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); doLogin(); }
    });

    function autoResizeInput() {
      const el = document.getElementById("input");
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 140) + "px";
    }

    // ── Debug panel ──
    const DBG_API = "/api/log-execution";

    async function dbgFetch() {
      const statusEl = document.getElementById("dbgStatus");
      const listEl   = document.getElementById("dbgList");
      const filter   = document.getElementById("dbgSessionFilter").value.trim();
      statusEl.textContent = "Loading…";
      try {
        const url = DBG_API + (filter ? "?sessionId=" + encodeURIComponent(filter) : "");
        const res = await fetch(url);
        if (!res.ok) throw new Error("HTTP " + res.status);
        const logs = await res.json();
        if (!Array.isArray(logs) || logs.length === 0) {
          listEl.innerHTML = '<div style="color:#4a5a7a;padding:8px 0;">No log entries found.</div>';
          statusEl.textContent = "0 entries";
          return;
        }
        listEl.innerHTML = logs.map(e => `
          <div style="border:1px solid #1a2030;border-radius:6px;margin-bottom:10px;overflow:hidden;">
            <div style="background:#111620;padding:7px 12px;display:flex;flex-wrap:wrap;gap:12px;align-items:baseline;">
              <span style="color:#d2691e;font-weight:bold;font-size:12px;">${escapeHtml(e.nodeName || "—")}</span>
              <span style="color:#6a7a9a;font-size:11px;">${escapeHtml(e.timestamp || "")}</span>
              <span style="color:#3a4a6a;font-size:10px;margin-left:auto;">session: ${escapeHtml(e.sessionId || "")}</span>
            </div>
            <pre style="margin:0;padding:10px 12px;background:#0a0c12;color:#8ab4d4;font-size:11px;line-height:1.55;overflow-x:auto;white-space:pre-wrap;word-break:break-all;">${escapeHtml(JSON.stringify(e.data, null, 2))}</pre>
          </div>`).join("");
        statusEl.textContent = logs.length + " entr" + (logs.length === 1 ? "y" : "ies") + " · " + new Date().toLocaleTimeString();
      } catch (err) {
        listEl.innerHTML = '<div style="color:#e05555;">Failed to fetch logs: ' + escapeHtml(err.message) + '</div>';
        statusEl.textContent = "";
      }
    }

    async function dbgClearAll() {
      if (!confirm("Delete all stored debug logs?")) return;
      try {
        await fetch(DBG_API, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ _clear: true }) });
        document.getElementById("dbgList").innerHTML = '<div style="color:#4a5a7a;">Logs cleared.</div>';
        document.getElementById("dbgStatus").textContent = "";
      } catch (err) {
        document.getElementById("dbgStatus").textContent = "Clear failed: " + err.message;
      }
    }

    // ── Init ──
    initTheme();
    if (new URLSearchParams(window.location.search).has("debug")) {
      showScreen("screen-debug");
      dbgFetch();
    } else {
      showScreen("screen-login");
    }
  </script>

  <!-- ── Debug Screen (visible only at ?debug) ── -->
  <div id="screen-debug" class="screen" style="min-height:100vh;min-height:100dvh;flex-direction:column;background:#0a0c12;color:#c8d8f0;font-family:'IBM Plex Mono',monospace;">
    <div style="flex-shrink:0;display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid #1a2030;background:#0d1018;">
      <span style="color:#d2691e;font-size:13px;font-weight:bold;letter-spacing:0.05em;">OaaS — Debug Logs</span>
      <span style="color:#2a3a55;font-size:10px;">/.netlify/functions/log-execution</span>
      <a href="/assistant" style="margin-left:auto;color:#3a5a8a;font-size:11px;text-decoration:none;">← back to chat</a>
    </div>
    <div style="flex-shrink:0;display:flex;gap:8px;padding:10px 18px;border-bottom:1px solid #1a2030;background:#0d1018;flex-wrap:wrap;">
      <input id="dbgSessionFilter"
             placeholder="filter by sessionId…"
             style="flex:1;min-width:180px;font-family:'IBM Plex Mono',monospace;font-size:12px;background:#0a0c12;color:#c8d8f0;border:1px solid #1a2030;border-radius:5px;padding:6px 10px;outline:none;"
             onkeydown="if(event.key==='Enter')dbgFetch()" />
      <button onclick="dbgFetch()"    style="font-family:'IBM Plex Mono',monospace;font-size:11px;background:#d2691e;color:#fff;border:none;border-radius:5px;padding:6px 16px;cursor:pointer;letter-spacing:0.05em;">Refresh</button>
      <button onclick="dbgClearAll()" style="font-family:'IBM Plex Mono',monospace;font-size:11px;background:transparent;color:#4a5a7a;border:1px solid #1a2030;border-radius:5px;padding:6px 16px;cursor:pointer;">Clear All</button>
    </div>
    <div id="dbgList" style="flex:1;overflow-y:auto;padding:14px 18px;"></div>
    <div id="dbgStatus" style="flex-shrink:0;padding:6px 18px;font-size:10px;color:#3a4a6a;border-top:1px solid #1a2030;background:#0d1018;"></div>
  </div>

</body>
</html>
